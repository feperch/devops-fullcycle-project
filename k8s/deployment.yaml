apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-devops
  namespace: default
  labels:
    app: hello-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-devops
  template:
    metadata:
      labels:
        app: hello-devops
    spec:
      containers:
      - name: app
        image: your-dockerhub-username/hello-devops:latest
        ports:
        - containerPort: 5000
        env:
        - name: ENV
          value: "production"
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
